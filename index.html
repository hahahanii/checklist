<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 체크리스트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f5f6fa; color: #2d3436; min-height: 100vh; }

/* 상단 헤더 */
.app-header { background: #fff; border-bottom: 1px solid #eee; padding: 16px 20px 0; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.app-title { font-size: 17px; font-weight: 800; color: #2d3436; }
.header-btns { display: flex; gap: 7px; }
.btn-new-week { padding: 7px 13px; border-radius: 20px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; background: #6c5ce7; color: #fff; transition: all 0.15s; white-space: nowrap; }
.btn-new-week:hover { background: #5a4bd1; }
.edit-toggle-btn { padding: 7px 13px; border-radius: 20px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; background: #f0eeff; color: #6c5ce7; transition: all 0.15s; white-space: nowrap; }
.edit-toggle-btn.on { background: #6c5ce7; color: #fff; }

/* 탭 */
.tabs-wrap { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab { padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; color: #b2bec3; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.tab:hover { color: #6c5ce7; }
.tab.active { color: #6c5ce7; border-bottom-color: #6c5ce7; }
.tab .tab-rate { font-size: 10px; font-weight: 500; margin-left: 5px; background: #f0eeff; color: #6c5ce7; padding: 1px 6px; border-radius: 10px; }
.tab.active .tab-rate { background: #6c5ce7; color: #fff; }
.tab.past .tab-rate { background: #f5f6fa; color: #b2bec3; }

/* 콘텐츠 */
.content { padding: 20px; }
.week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.week-title-wrap { display: flex; align-items: center; gap: 10px; }
.week-title { font-size: 16px; font-weight: 800; }
.week-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: #f0eeff; color: #6c5ce7; }
.week-badge.past { background: #f5f6fa; color: #b2bec3; }
.progress-wrap { margin-bottom: 18px; }
.progress-bar-bg { background: #dfe6e9; border-radius: 10px; height: 8px; overflow: hidden; }
.progress-bar { background: #6c5ce7; height: 100%; border-radius: 10px; transition: width 0.4s ease; }
.progress-label { font-size: 12px; color: #636e72; margin-top: 4px; display: flex; justify-content: space-between; }
.save-status { font-size: 11px; display: flex; align-items: center; gap: 4px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: #b2bec3; flex-shrink: 0; transition: background 0.3s; }
.save-dot.saved { background: #00b894; }
.save-dot.error { background: #e17055; }

/* 필터 */
.filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn { padding: 5px 13px; border-radius: 20px; border: 1.5px solid #dfe6e9; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: #636e72; transition: all 0.15s; }
.filter-btn.active { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }

/* 카테고리/태스크 */
.category-block { background: #fff; border-radius: 14px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
.category-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
.category-title { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 700; }
.cat-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.cat-count { font-size: 12px; font-weight: 500; color: #636e72; background: #f5f6fa; border-radius: 20px; padding: 2px 9px; margin-left: 2px; }
.chevron { font-size: 11px; color: #b2bec3; transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(90deg); }
.task-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
.task-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 10px; background: #f9fafb; cursor: pointer; transition: background 0.15s; }
.task-item:hover { background: #f0f1f7; }
.task-item.done { opacity: 0.5; }
.task-item.done .task-text { text-decoration: line-through; color: #b2bec3; }
.task-item.readonly { cursor: default; }
.task-item.readonly:hover { background: #f9fafb; }
.checkbox { width: 19px; height: 19px; border-radius: 5px; border: 2px solid #dfe6e9; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; background: #fff; transition: all 0.15s; cursor: pointer; }
.task-item.done .checkbox { background: #6c5ce7; border-color: #6c5ce7; }
.task-item.readonly .checkbox { cursor: default; }
.checkmark { color: #fff; font-size: 12px; display: none; }
.task-item.done .checkmark { display: block; }
.task-text { font-size: 13.5px; line-height: 1.55; flex: 1; }
.task-notes { margin-top: 5px; font-size: 12px; color: #636e72; background: #fff; border-left: 3px solid #dfe6e9; padding: 6px 10px; border-radius: 0 6px 6px 0; line-height: 1.65; }
.task-notes a { color: #6c5ce7; word-break: break-all; }

/* 편집 모드 */
.task-edit-row { display: flex; flex-direction: column; gap: 6px; padding: 10px 12px; border-radius: 10px; background: #fafafa; border: 1.5px solid #e0e0e0; }
.task-edit-row input, .task-edit-row textarea { width: 100%; border: 1.5px solid #dfe6e9; border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; background: #fff; resize: vertical; outline: none; color: #2d3436; }
.task-edit-row input:focus, .task-edit-row textarea:focus { border-color: #6c5ce7; }
.task-edit-row textarea { min-height: 52px; }
.edit-row-btns { display: flex; gap: 6px; justify-content: flex-end; }
.btn-del { padding: 4px 11px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff0f0; color: #e17055; }
.btn-del:hover { background: #ffe0e0; }
.add-task-btn { display: flex; align-items: center; gap: 6px; padding: 9px 12px; border-radius: 10px; border: 1.5px dashed #dfe6e9; background: transparent; font-size: 13px; color: #b2bec3; cursor: pointer; width: 100%; font-family: inherit; transition: all 0.15s; }
.add-task-btn:hover { border-color: #6c5ce7; color: #6c5ce7; background: #f0eeff; }
.cat-edit-bar { display: flex; align-items: center; gap: 8px; padding: 0 16px 12px; }
.cat-edit-bar input[type=text] { border: 1.5px solid #dfe6e9; border-radius: 8px; padding: 5px 10px; font-size: 13px; font-family: inherit; background: #f9fafb; outline: none; color: #2d3436; width: 130px; }
.cat-edit-bar input[type=text]:focus { border-color: #6c5ce7; }
.cat-edit-bar input[type=color] { width: 34px; height: 30px; padding: 2px; cursor: pointer; border-radius: 8px; border: 1.5px solid #dfe6e9; }
.btn-del-cat { padding: 4px 11px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff0f0; color: #e17055; margin-left: auto; }
.add-cat-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 12px; border-radius: 14px; border: 2px dashed #dfe6e9; background: transparent; font-size: 13px; font-weight: 600; color: #b2bec3; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-bottom: 14px; }
.add-cat-btn:hover { border-color: #6c5ce7; color: #6c5ce7; background: #f0eeff; }

/* 주차 삭제 버튼 */
.btn-del-week { padding: 5px 11px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff0f0; color: #e17055; }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 16px; padding: 24px 22px; width: 92%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.modal label { font-size: 12px; font-weight: 600; color: #636e72; display: block; margin-bottom: 4px; margin-top: 12px; }
.modal input[type=text] { width: 100%; border: 1.5px solid #dfe6e9; border-radius: 8px; padding: 8px 11px; font-size: 13px; font-family: inherit; outline: none; color: #2d3436; }
.modal input[type=text]:focus { border-color: #6c5ce7; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.btn-cancel { padding: 8px 16px; border-radius: 9px; border: 1.5px solid #dfe6e9; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #636e72; }
.btn-confirm { padding: 8px 16px; border-radius: 9px; border: none; background: #6c5ce7; font-size: 13px; font-weight: 700; cursor: pointer; color: #fff; }
.loading { text-align: center; padding: 60px 20px; color: #b2bec3; font-size: 14px; }
.past-notice { text-align: center; padding: 14px; background: #f9fafb; border-radius: 12px; font-size: 13px; color: #b2bec3; margin-bottom: 14px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">📋 업무 체크리스트</div>
    <div class="header-btns">
      <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">✏️ 편집</button>
      <button class="btn-new-week" onclick="showNewWeekModal()">＋ 새 주차</button>
    </div>
  </div>
  <div class="tabs-wrap" id="tabsWrap"></div>
</div>

<div class="content">
  <div id="weekContent"><div class="loading">불러오는 중...</div></div>
</div>
<div id="modal-root"></div>

<script>
const SUPABASE_URL = 'https://wreciwniveemhsuqyrmf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyZWNpd25pdmVlbWhzdXF5cm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTg5NzgsImV4cCI6MjA5ODEzNDk3OH0.IsbB-5ktnFPspQBrPT0K5R6yu2ySJaZZYexe7a1SFFI';
const ROW_ID = 1;

const defaultWeek = {
  id: 'week_629',
  label: '6/29-30',
  createdAt: '2025-06-29',
  categories: [
    { id: 'unitree', label: '유니트리', color: '#6c5ce7', tasks: [
      { id: 1, text: 'H2 로봇 배송 정보 작성 후 전달', notes: '임시 수출입 통관 필요 정보:\n① 화물 관세 부담 주체  ② 수출 목적  ③ 수하인  ④ 회사명  ⑤ 국가/지역  ⑥ 주소  ⑦ 담당자  ⑧ 연락처  ⑨ 이메일  ⑩ 우편번호\n※ ③~⑩ 영문으로 작성' },
      { id: 3, text: '통역사에게 미팅 정보 전달', notes: '결재 방법 → 티나님에게 확인\n로봇 H2 수령 여부도 함께 확인' },
      { id: 4, text: 'H2 두 대 + 샘플 중국 재발송 가능 여부 확인', notes: '티나 또는 레나에게 확인' },
      { id: 6, text: '유니트리 교육 리스트 작성 (7/14 커리큘럼)', notes: '참여자: 문상훈, 한태희, 이한샘, 김소희, 이정환(?), EQBR\n교육: ① 로봇 동시구동  ② 로봇 균형 보정\n확인: Demo Teaching 내용 로봇 적용 가능 여부 / 팀장님들에게 리스트 받기' },
    ]},
    { id: 'robotpark', label: '로봇파크', color: '#00b894', tasks: [
      { id: 2, text: '맥북 수령 여부 데이비드에게 확인 + 아이폰 EQBR에게 받기' },
      { id: 11, text: '알바 인력 스케줄 확인 (수·목·금)', notes: '목·금 콜타임 확정 (10시~19시?)\n금요일 운영 방식 동일 여부 확인\n리허설 시간 포함' },
      { id: 12, text: '업무용 전산장비신청서 처리 방법 확인', notes: '이사님에게 확인' },
      { id: 13, text: '와이파이 공유기 부대표님 날인 요청', notes: '화요일에 구매할 수 있도록' },
      { id: 15, text: '유림 실장님에게 의상 및 로봇 발송 방법 확인', notes: '로봇 배터리 가져와야 함' },
      { id: 16, text: '위드브로·맥켄 계약서 처리 방법 확인' },
      { id: 17, text: '다이소 충전기 10개 구매', notes: '이사님에게 먼저 확인' },
    ]},
    { id: 'vivatech', label: '비바테크', color: '#e84393', tasks: [
      { id: 7, text: '리빌더 AI 앙드레김 의상 수령', notes: '송지훈 팀장에게 오전 중 연락' },
      { id: 8, text: '클래스퀸 비용 결재 문의 메일 발송' },
      { id: 9, text: '리빌더 계약서 날인 및 입금 일정 확인', notes: '금주 날인 완료 → 다음 주 입금\n모두싸인 주소 노트북에 저장' },
    ]},
    { id: 'swiss', label: '스위스', color: '#e67e22', tasks: [
      { id: 5, text: '시난에게 스위스 관련 필요 사항 확인 및 정리' },
      { id: 10, text: '시난에게 스위스 일정 확인' },
    ]},
    { id: 'etc', label: '기타', color: '#0984e3', tasks: [
      { id: 14, text: '면접자 5명 이력서 검토', notes: '면접 링크 발송 + 체크 사항 확인\nhttps://www.jobkorea.co.kr/Recruit/GI_Read/49336601' },
    ]}
  ],
  checked: {}
};

// ===================== DB =====================
async function dbLoad() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist?id=eq.${ROW_ID}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  const rows = await res.json();
  return rows.length ? rows[0].data : null;
}
async function dbSave(payload) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ id: ROW_ID, data: payload })
  });
  return res.ok || res.status === 201;
}

// ===================== 상태 =====================
let weeks = [];
let activeWeekId = null;
let activeFilter = 'all';
let collapsed = {};
let editMode = false;
let nextId = 500;
let saveTimer = null;

function getActiveWeek() { return weeks.find(w => w.id === activeWeekId) || weeks[0]; }
function isLatestWeek() { return weeks.length > 0 && getActiveWeek().id === weeks[weeks.length - 1].id; }

// ===================== 저장 =====================
async function loadFromDB() {
  try {
    const data = await dbLoad();
    if (data && data.weeks && data.weeks.length > 0) {
      weeks = data.weeks;
    } else {
      weeks = [JSON.parse(JSON.stringify(defaultWeek))];
      await dbSave({ weeks });
    }
    activeWeekId = weeks[weeks.length - 1].id;
    setSaveStatus('saved');
  } catch(e) {
    weeks = [JSON.parse(JSON.stringify(defaultWeek))];
    activeWeekId = weeks[0].id;
    setSaveStatus('error');
  }
  render();
}

function scheduleSave() {
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const ok = await dbSave({ weeks });
      setSaveStatus(ok ? 'saved' : 'error');
    } catch(e) { setSaveStatus('error'); }
  }, 800);
}

function setSaveStatus(state) {
  const dot = document.getElementById('saveDot');
  const txt = document.getElementById('saveText');
  if (!dot) return;
  if (state === 'saved') { dot.className = 'save-dot saved'; txt.textContent = '저장됨 ✓'; }
  else if (state === 'saving') { dot.className = 'save-dot'; txt.textContent = '저장 중...'; }
  else { dot.className = 'save-dot error'; txt.textContent = '저장 실패'; }
}

// ===================== 탭 렌더 =====================
function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  weeks.forEach(w => {
    const total = w.categories.reduce((s, c) => s + c.tasks.length, 0);
    const done = Object.values(w.checked || {}).filter(Boolean).length;
    const rate = total ? Math.round(done / total * 100) : 0;
    const isActive = w.id === activeWeekId;
    const isLatest = w.id === weeks[weeks.length - 1].id;
    const tab = document.createElement('div');
    tab.className = 'tab' + (isActive ? ' active' : '') + (!isLatest ? ' past' : '');
    tab.innerHTML = w.label + '<span class="tab-rate">' + rate + '%</span>';
    tab.onclick = () => { activeWeekId = w.id; activeFilter = 'all'; editMode = false; updateEditBtn(); render(); };
    wrap.appendChild(tab);
  });
}

function updateEditBtn() {
  const btn = document.getElementById('editToggleBtn');
  if (!btn) return;
  btn.textContent = editMode ? '✅ 완료' : '✏️ 편집';
  btn.classList.toggle('on', editMode);
  btn.style.display = isLatestWeek() ? '' : 'none';
}

// ===================== 메인 렌더 =====================
function render() {
  renderTabs();
  updateEditBtn();
  const week = getActiveWeek();
  if (!week) return;
  const isPast = !isLatestWeek();
  const total = week.categories.reduce((s, c) => s + c.tasks.length, 0);
  const done = Object.values(week.checked || {}).filter(Boolean).length;
  const rate = total ? Math.round(done / total * 100) : 0;

  // 필터
  const visibleCats = activeFilter === 'all' ? week.categories : week.categories.filter(c => c.id === activeFilter);

  let html = '';

  // 주차 헤더
  html += '<div class="week-header">';
  html += '<div class="week-title-wrap"><span class="week-title">' + esc(week.label) + '</span>';
  html += '<span class="week-badge' + (isPast ? ' past' : '') + '">' + (isPast ? '✓ 완료됨' : '진행중') + '</span></div>';
  if (isPast) html += '<button class="btn-del-week" onclick="deleteWeek(\'' + week.id + '\')">삭제</button>';
  html += '</div>';

  // 진행률
  html += '<div class="progress-wrap">';
  html += '<div class="progress-bar-bg"><div class="progress-bar" style="width:' + rate + '%"></div></div>';
  html += '<div class="progress-label"><span>' + done + ' / ' + total + ' 완료</span>';
  html += '<span class="save-status"><div class="save-dot saved" id="saveDot"></div><span id="saveText">저장됨 ✓</span></span></div>';
  html += '</div>';

  // 과거 주차 안내
  if (isPast) html += '<div class="past-notice">📁 지난 주차 기록입니다. 읽기 전용으로 보관됩니다.</div>';

  // 필터 버튼
  html += '<div class="filter-row" id="filterRow"></div>';
  html += '<div id="catContainer"></div>';
  if (!isPast && editMode) html += '<div id="addCatWrap"></div>';

  document.getElementById('weekContent').innerHTML = html;

  // 필터 버튼 렌더
  const filterRow = document.getElementById('filterRow');
  const makeFilterBtn = (id, label, color) => {
    const btn = document.createElement('button');
    const isActive = activeFilter === id;
    btn.className = 'filter-btn' + (isActive ? ' active' : '');
    if (isActive && color) { btn.style.background = color; btn.style.borderColor = color; btn.style.color = '#fff'; }
    btn.textContent = label;
    btn.onclick = () => { activeFilter = id; render(); };
    filterRow.appendChild(btn);
  };
  makeFilterBtn('all', '전체', null);
  week.categories.forEach(c => makeFilterBtn(c.id, c.label, c.color));

  // 카테고리 렌더
  const catContainer = document.getElementById('catContainer');
  week.categories.forEach((cat, ci) => {
    if (activeFilter !== 'all' && activeFilter !== cat.id) return;
    const block = document.createElement('div');
    block.className = 'category-block';
    const doneCount = cat.tasks.filter(t => (week.checked || {})[t.id]).length;
    const isOpen = !collapsed[week.id + cat.id];

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML =
      '<div class="category-title"><div class="cat-dot" style="background:' + cat.color + '"></div>' +
      '<span>' + esc(cat.label) + '</span><span class="cat-count">' + doneCount + '/' + cat.tasks.length + '</span></div>' +
      '<span class="chevron' + (isOpen ? ' open' : '') + '">&#9658;</span>';
    header.onclick = () => { collapsed[week.id + cat.id] = !collapsed[week.id + cat.id]; render(); };
    block.appendChild(header);

    if (!isPast && editMode && isOpen) {
      const editBar = document.createElement('div');
      editBar.className = 'cat-edit-bar';
      editBar.onclick = e => e.stopPropagation();
      editBar.innerHTML =
        '<input type="text" value="' + esc(cat.label) + '" placeholder="카테고리명" oninput="updateCatLabel(' + ci + ', this.value)">' +
        '<input type="color" value="' + cat.color + '" oninput="updateCatColor(' + ci + ', this.value)">' +
        '<button class="btn-del-cat" onclick="deleteCat(' + ci + ')">삭제</button>';
      block.appendChild(editBar);
    }

    const list = document.createElement('div');
    list.className = 'task-list';
    if (!isOpen) { list.style.display = 'none'; block.appendChild(list); catContainer.appendChild(block); return; }

    cat.tasks.forEach((t, ti) => {
      if (!isPast && editMode) {
        const row = document.createElement('div');
        row.className = 'task-edit-row';
        row.innerHTML =
          '<input type="text" value="' + esc(t.text) + '" placeholder="항목 내용" oninput="updateTaskText(' + ci + ',' + ti + ', this.value)">' +
          '<textarea placeholder="세부 메모 (선택)" oninput="updateTaskNotes(' + ci + ',' + ti + ', this.value)">' + esc(t.notes||'') + '</textarea>' +
          '<div class="edit-row-btns"><button class="btn-del" onclick="deleteTask(' + ci + ',' + ti + ')">삭제</button></div>';
        list.appendChild(row);
      } else {
        const item = document.createElement('div');
        const isDone = (week.checked || {})[t.id];
        item.className = 'task-item' + (isDone ? ' done' : '') + (isPast ? ' readonly' : '');
        item.innerHTML =
          '<div class="checkbox"><span class="checkmark">&#10003;</span></div>' +
          '<div style="flex:1"><div class="task-text">' + formatText(t.text) + '</div>' +
          (t.notes ? '<div class="task-notes">' + formatNotes(t.notes) + '</div>' : '') + '</div>';
        if (!isPast) {
          const toggle = () => { if (!week.checked) week.checked = {}; week.checked[t.id] = !week.checked[t.id]; scheduleSave(); render(); };
          item.querySelector('.checkbox').onclick = e => { e.stopPropagation(); toggle(); };
          item.onclick = toggle;
        }
        list.appendChild(item);
      }
    });

    if (!isPast && editMode) {
      const addBtn = document.createElement('button');
      addBtn.className = 'add-task-btn';
      addBtn.innerHTML = '＋ 항목 추가';
      addBtn.onclick = () => addTask(ci);
      list.appendChild(addBtn);
    }

    block.appendChild(list);
    catContainer.appendChild(block);
  });

  // 카테고리 추가 버튼
  const addCatWrap = document.getElementById('addCatWrap');
  if (addCatWrap && !isPast && editMode && activeFilter === 'all') {
    const btn = document.createElement('button');
    btn.className = 'add-cat-btn';
    btn.innerHTML = '＋ 카테고리 추가';
    btn.onclick = showAddCatModal;
    addCatWrap.appendChild(btn);
  }
}

// ===================== 편집 =====================
function toggleEditMode() {
  if (!isLatestWeek()) return;
  editMode = !editMode;
  updateEditBtn();
  if (!editMode) scheduleSave();
  render();
}
function updateCatLabel(ci, val) { getActiveWeek().categories[ci].label = val; renderTabs(); }
function updateCatColor(ci, val) { getActiveWeek().categories[ci].color = val; render(); }
function deleteCat(ci) {
  if (!confirm('"' + getActiveWeek().categories[ci].label + '" 카테고리를 삭제할까요?')) return;
  getActiveWeek().categories.splice(ci, 1);
  activeFilter = 'all'; scheduleSave(); render();
}
function updateTaskText(ci, ti, val) { getActiveWeek().categories[ci].tasks[ti].text = val; }
function updateTaskNotes(ci, ti, val) { getActiveWeek().categories[ci].tasks[ti].notes = val; }
function deleteTask(ci, ti) { getActiveWeek().categories[ci].tasks.splice(ti, 1); scheduleSave(); render(); }
function addTask(ci) { getActiveWeek().categories[ci].tasks.push({ id: nextId++, text: '', notes: '' }); scheduleSave(); render(); }

// ===================== 새 주차 =====================
function showNewWeekModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-overlay" onclick="closeModal()">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
    '<h3>📅 새 주차 추가</h3>' +
    '<label>주차 이름 (예: 7/7-11)</label>' +
    '<input type="text" id="newWeekLabel" placeholder="7/7-11" autofocus>' +
    '<div class="modal-btns">' +
    '<button class="btn-cancel" onclick="closeModal()">취소</button>' +
    '<button class="btn-confirm" onclick="confirmNewWeek()">추가</button>' +
    '</div></div></div>';
}

function confirmNewWeek() {
  const label = document.getElementById('newWeekLabel').value.trim();
  if (!label) { alert('주차 이름을 입력해주세요.'); return; }
  const newWeek = {
    id: 'week_' + Date.now(),
    label,
    createdAt: new Date().toISOString().slice(0, 10),
    categories: [],
    checked: {}
  };
  weeks.push(newWeek);
  activeWeekId = newWeek.id;
  activeFilter = 'all';
  editMode = true;
  closeModal(); scheduleSave(); render();
}

function deleteWeek(wid) {
  const w = weeks.find(x => x.id === wid);
  if (!confirm('"' + w.label + '" 주차를 삭제할까요?')) return;
  weeks = weeks.filter(x => x.id !== wid);
  activeWeekId = weeks[weeks.length - 1].id;
  scheduleSave(); render();
}

function showAddCatModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-overlay" onclick="closeModal()">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
    '<h3>새 카테고리 추가</h3>' +
    '<label>카테고리 이름</label>' +
    '<input type="text" id="newCatName" placeholder="예: 마케팅" autofocus>' +
    '<label>색상</label>' +
    '<input type="color" id="newCatColor" value="#a29bfe" style="width:48px;height:34px;padding:2px;border-radius:8px;border:1.5px solid #dfe6e9;cursor:pointer;">' +
    '<div class="modal-btns">' +
    '<button class="btn-cancel" onclick="closeModal()">취소</button>' +
    '<button class="btn-confirm" onclick="confirmAddCat()">추가</button>' +
    '</div></div></div>';
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function confirmAddCat() {
  const name = document.getElementById('newCatName').value.trim();
  const color = document.getElementById('newCatColor').value;
  if (!name) { alert('카테고리 이름을 입력해주세요.'); return; }
  getActiveWeek().categories.push({ id: 'cat_' + Date.now(), label: name, color, tasks: [] });
  closeModal(); scheduleSave(); render();
}

function formatText(str) {
  // **굵게** 처리
  return (str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/https?:\/\/\S+/g, url => '<a href="' + url + '" target="_blank">' + url + '</a>');
}
function formatNotes(notes) {
  return formatText(notes).replace(/\n/g, '<br>');
}
function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Ctrl+B 지원: 편집 input/textarea에 이벤트 위임
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
    const el = document.activeElement;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
      e.preventDefault();
      const start = el.selectionStart;
      const end = el.selectionEnd;
      const val = el.value;
      const selected = val.slice(start, end);
      if (!selected) return;
      // 이미 굵게 처리된 경우 토글(제거)
      if (selected.startsWith('**') && selected.endsWith('**')) {
        const inner = selected.slice(2, -2);
        el.value = val.slice(0, start) + inner + val.slice(end);
        el.setSelectionRange(start, start + inner.length);
      } else {
        const replaced = '**' + selected + '**';
        el.value = val.slice(0, start) + replaced + val.slice(end);
        el.setSelectionRange(start, start + replaced.length);
      }
      el.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }
});

loadFromDB();
