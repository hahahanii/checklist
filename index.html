<!DOCTYPE html>
<html lang="ko">

<style>

body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f5f6fa; color: #2d3436; min-height: 100vh; }
.app-header { background: #fff; border-bottom: 1px solid #eee; padding: 16px 20px 0; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }

.app-title { font-size: 17px; font-weight: 800; color: #2d3436; }

.btn-new-week { padding: 7px 13px; border-radius: 20px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; background: #6c5ce7; color: #fff; transition: all 0.15s; }

.tab { padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; color: #b2bec3; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }

.tab.active { color: #6c5ce7; border-bottom-color: #6c5ce7; }

.progress-bar-bg { background: #dfe6e9; border-radius: 10px; height: 8px; overflow: hidden; }

.progress-label { font-size: 12px; color: #636e72; margin-top: 4px; display: flex; justify-content: space-between; }
.save-status { font-size: 11px; display: flex; align-items: center; gap: 4px; }

.save-dot.error { background: #e17055; }
.filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn { padding: 5px 13px; border-radius: 20px; border: 1.5px solid #dfe6e9; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: #636e72; transition: all 0.15s; }
.filter-btn.active { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
.category-block { background: #fff; border-radius: 14px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 1px 5px rgba(0,0,0,0.07); transition: opacity 0.15s; }
.category-block.drag-over { outline: 2px dashed #6c5ce7; background: #f8f6ff; }
.category-block.dragging { opacity: 0.35; }
.category-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
.category-title { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 700; }

.task-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 10px; background: #f9fafb; cursor: pointer; transition: background 0.15s; }

.notes-content.empty { color: #d0d0d0; font-style: italic; }
.edit-notes-tabs { display: flex; gap: 0; margin-bottom: 4px; border-bottom: 1.5px solid #f0f0f0; }
.edit-notes-tab { font-size: 11px; font-weight: 600; padding: 4px 10px; cursor: pointer; color: #b2bec3; border-bottom: 2px solid transparent; margin-bottom: -1.5px; transition: all 0.15s; }
.edit-notes-tab.active { color: #6c5ce7; border-bottom-color: #6c5ce7; }
.task-edit-row { display: flex; flex-direction: column; gap: 6px; padding: 10px 10px 10px 12px; border-radius: 10px; background: #fafafa; border: 1.5px solid #e0e0e0; transition: opacity 0.15s; }

.task-edit-row textarea { width: 100%; border: 1.5px solid #dfe6e9; border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; background: #fff; resize: vertical; outline: none; color: #2d3436; min-height: 52px; }

.edit-row-btns { display: flex; gap: 6px; justify-content: flex-end; }

.add-task-btn { display: flex; align-items: center; gap: 6px; padding: 9px 12px; border-radius: 10px; border: 1.5px dashed #dfe6e9; background: transparent; font-size: 13px; color: #b2bec3; cursor: pointer; width: 100%; font-family: inherit; transition: all 0.15s; }

.cat-edit-bar { display: flex; align-items: center; gap: 8px; padding: 0 16px 12px; }

.cat-edit-bar input[type=text]:focus { border-color: #6c5ce7; }
.cat-edit-bar input[type=color] { width: 34px; height: 30px; padding: 2px; cursor: pointer; border-radius: 8px; border: 1.5px solid #dfe6e9; }
.btn-del-cat { padding: 4px 11px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff0f0; color: #e17055; margin-left: auto; }
.add-cat-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 12px; border-radius: 14px; border: 2px dashed #dfe6e9; background: transparent; font-size: 13px; font-weight: 600; color: #b2bec3; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-bottom: 14px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }

.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.modal label { font-size: 12px; font-weight: 600; color: #636e72; display: block; margin-bottom: 4px; margin-top: 12px; }
.modal input[type=text] { width: 100%; border: 1.5px solid #dfe6e9; border-radius: 8px; padding: 8px 11px; font-size: 13px; font-family: inherit; outline: none; color: #2d3436; }
.modal input[type=text]:focus { border-color: #6c5ce7; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.btn-cancel { padding: 8px 16px; border-radius: 9px; border: 1.5px solid #dfe6e9; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #636e72; }
.btn-confirm { padding: 8px 16px; border-radius: 9px; border: none; background: #6c5ce7; font-size: 13px; font-weight: 700; cursor: pointer; color: #fff; }
.loading { text-align: center; padding: 60px 20px; color: #b2bec3; font-size: 14px; }
</style>

<body>

<script>
// ===== Supabase =====
const SUPABASE_URL = 'https://wreciwniveemhsuqyrmf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyZWNpd25pdmVlbWhzdXF5cm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTg5NzgsImV4cCI6MjA5ODEzNDk3OH0.IsbB-5ktnFPspQBrPT0K5R6yu2ySJaZZYexe7a1SFFI';
const ROW_ID = 1;
async function dbLoad() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist?id=eq.${ROW_ID}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  const rows = await res.json();
  return rows.length ? rows[0].data : null;
}
async function dbSave(payload) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ id: ROW_ID, data: payload })
  });
  return res.ok || res.status === 201;
}

// ===== 기본 데이터 =====
const defaultWeek = {
  id: 'week_629', label: '6/29-30', createdAt: '2025-06-29',
  categories: [
    { id: 'unitree', label: '유니트리', color: '#6c5ce7', tasks: [
      { id: 1, text: 'H2 로봇 배송 정보 작성 후 전달', notes: '임시 수출입 통관 필요 정보:\n① 화물 관세 부담 주체  ② 수출 목적  ③ 수하인  ④ 회사명  ⑤ 국가/지역  ⑥ 주소  ⑦ 담당자  ⑧ 연락처  ⑨ 이메일  ⑩ 우편번호\n※ ③~⑩ 영문으로 작성' },
      { id: 3, text: '통역사에게 미팅 정보 전달', notes: '결재 방법 → 티나님에게 확인\n로봇 H2 수령 여부도 함께 확인' },
      { id: 4, text: 'H2 두 대 + 샘플 중국 재발송 가능 여부 확인', notes: '티나 또는 레나에게 확인' },
      { id: 6, text: '유니트리 교육 리스트 작성 (7/14 커리큘럼)', notes: '참여자: 문상훈, 한태희, 이한샘, 김소희, 이정환(?), EQBR\n교육: ① 로봇 동시구동  ② 로봇 균형 보정\n확인: Demo Teaching 내용 로봇 적용 가능 여부 / 팀장님들에게 리스트 받기' },
    ]},
    { id: 'robotpark', label: '로봇파크', color: '#00b894', tasks: [
      { id: 2, text: '맥북 수령 여부 데이비드에게 확인 + 아이폰 EQBR에게 받기' },
      { id: 11, text: '알바 인력 스케줄 확인 (수·목·금)', notes: '목·금 콜타임 확정 (10시~19시?)\n금요일 운영 방식 동일 여부 확인\n리허설 시간 포함' },
      { id: 12, text: '업무용 전산장비신청서 처리 방법 확인', notes: '이사님에게 확인' },
      { id: 13, text: '와이파이 공유기 부대표님 날인 요청', notes: '화요일에 구매할 수 있도록' },
      { id: 15, text: '유림 실장님에게 의상 및 로봇 발송 방법 확인', notes: '로봇 배터리 가져와야 함' },
      { id: 16, text: '위드브로·맥켄 계약서 처리 방법 확인' },
      { id: 17, text: '다이소 충전기 10개 구매', notes: '이사님에게 먼저 확인' },
    ]},
    { id: 'vivatech', label: '비바테크', color: '#e84393', tasks: [
      { id: 7, text: '리빌더 AI 앙드레김 의상 수령', notes: '송지훈 팀장에게 오전 중 연락' },
      { id: 8, text: '클래스퀸 비용 결재 문의 메일 발송' },
      { id: 9, text: '리빌더 계약서 날인 및 입금 일정 확인', notes: '금주 날인 완료 → 다음 주 입금\n모두싸인 주소 노트북에 저장' },
    ]},
    { id: 'swiss', label: '스위스', color: '#e67e22', tasks: [
      { id: 5, text: '시난에게 스위스 관련 필요 사항 확인 및 정리' },
      { id: 10, text: '시난에게 스위스 일정 확인' },
    ]},
    { id: 'etc', label: '기타', color: '#0984e3', tasks: [
      { id: 14, text: '면접자 5명 이력서 검토', notes: '면접 링크 발송 + 체크 사항 확인\nhttps://www.jobkorea.co.kr/Recruit/GI_Read/49336601' },
    ]}
  ],
  checked: {}
};

// ===== 상태 =====
let weeks = [];
let activeWeekId = null;
let activeFilter = 'all';
let collapsed = {};
let editMode = false;
let nextId = 500;
let saveTimer = null;
let undoStack = [];
let noteTabState = {}; // 각 항목의 탭 상태 저장

function getActiveWeek() { return weeks.find(w => w.id === activeWeekId) || weeks[0]; }

// ===== 실행취소 =====
function saveSnapshot() {
  undoStack.push(JSON.stringify(weeks));
  if (undoStack.length > 20) undoStack.shift();
  updateUndoBtn();
}
function undo() {
  if (!undoStack.length) return;
  weeks = JSON.parse(undoStack.pop());
  updateUndoBtn();
  scheduleSave();
  render();
}
function updateUndoBtn() {
  const btn = document.getElementById('undoBtn');
  if (!btn) return;
  if (undoStack.length > 0) { btn.removeAttribute('disabled'); }
  else { btn.setAttribute('disabled', ''); }
}

// ===== DB =====
function fixDuplicateIds(weeksData) {
  // 모든 task id를 고유하게 재발급
  let counter = 1;
  const seen = new Set();
  weeksData.forEach(w => {
    w.categories.forEach(c => {
      c.tasks.forEach(t => {
        if (!t.id || seen.has(t.id)) {
          // 중복이거나 없으면 새 id 부여, checked도 마이그레이션
          const oldId = t.id;
          t.id = Date.now() + counter++;
          // 기존 checked 상태 이전
          if (oldId && w.checked && w.checked[oldId] !== undefined) {
            w.checked[t.id] = w.checked[oldId];
            delete w.checked[oldId];
          }
        } else {
          seen.add(t.id);
        }
      });
    });
  });
  return weeksData;
}

async function loadFromDB() {
  try {
    const data = await dbLoad();
    if (data && data.weeks && data.weeks.length > 0) {
      weeks = fixDuplicateIds(data.weeks);
    } else {
      weeks = [JSON.parse(JSON.stringify(defaultWeek))];
      await dbSave({ weeks });
    }
    activeWeekId = weeks[weeks.length - 1].id;
    setSaveStatus('saved');
    // id 정리 후 바로 저장
    await dbSave({ weeks });
  } catch(e) {
    weeks = [JSON.parse(JSON.stringify(defaultWeek))];
    activeWeekId = weeks[0].id;
    setSaveStatus('error');
  }
  render();
}
function scheduleSave() {
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { setSaveStatus(await dbSave({ weeks }) ? 'saved' : 'error'); }
    catch(e) { setSaveStatus('error'); }
  }, 800);
}
function setSaveStatus(s) {
  const dot = document.getElementById('saveDot');
  const txt = document.getElementById('saveText');
  if (!dot) return;
  if (s === 'saved') { dot.className = 'save-dot saved'; txt.textContent = '저장됨 ✓'; }
  else if (s === 'saving') { dot.className = 'save-dot'; txt.textContent = '저장 중...'; }
  else { dot.className = 'save-dot error'; txt.textContent = '저장 실패'; }
}

// ===== 탭 =====
function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  weeks.forEach(w => {
    const total = w.categories.reduce((s, c) => s + c.tasks.length, 0);
    const done = Object.values(w.checked || {}).filter(Boolean).length;
    const rate = total ? Math.round(done / total * 100) : 0;
    const tab = document.createElement('div');
    tab.className = 'tab' + (w.id === activeWeekId ? ' active' : '');
    // 라벨
    const labelSpan = document.createElement('span');
    labelSpan.textContent = w.label;
    // 비율
    const rateSpan = document.createElement('span');
    rateSpan.className = 'tab-rate';
    rateSpan.textContent = rate + '%';
    // 삭제
    const delSpan = document.createElement('span');
    delSpan.className = 'tab-del';
    delSpan.textContent = '✕';
    delSpan.title = '주차 삭제';
    delSpan.onclick = e => { e.stopPropagation(); deleteWeek(w.id); };
    tab.appendChild(labelSpan);
    tab.appendChild(rateSpan);
    tab.appendChild(delSpan);
    tab.onclick = () => { activeWeekId = w.id; activeFilter = 'all'; editMode = false; updateEditBtn(); render(); };
    wrap.appendChild(tab);
  });
}
function updateEditBtn() {
  const btn = document.getElementById('editToggleBtn');
  if (!btn) return;
  btn.textContent = editMode ? '✅ 완료' : '✏️ 편집';
  btn.classList.toggle('on', editMode);
}

// ===== 텍스트 포맷 =====
function formatText(str) {
  return (str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/https?:\/\/[^\s<]+/g, url => '<a href="' + url + '" target="_blank">' + url + '</a>');
}
function formatNotes(str) { return formatText(str).replace(/\n/g, '<br>'); }
function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== Ctrl+B =====
function applyBold(el, onChangeFn) {
  el.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
      e.preventDefault();
      e.stopPropagation();
      const s = el.selectionStart, end = el.selectionEnd;
      const val = el.value;
      const sel = val.slice(s, end);
      if (!sel) return;
      let newVal, ns, ne;
      if (sel.startsWith('**') && sel.endsWith('**') && sel.length > 4) {
        const inner = sel.slice(2, -2);
        newVal = val.slice(0, s) + inner + val.slice(end);
        ns = s; ne = s + inner.length;
      } else {
        const r = '**' + sel + '**';
        newVal = val.slice(0, s) + r + val.slice(end);
        ns = s; ne = s + r.length;
      }
      el.value = newVal;
      el.setSelectionRange(ns, ne);
      onChangeFn(newVal);
      scheduleSave();
    }
  });
}

// ===== 메인 렌더 =====
function render() {
  renderTabs();
  updateEditBtn();
  updateUndoBtn();
  const week = getActiveWeek();
  if (!week) return;
  const total = week.categories.reduce((s, c) => s + c.tasks.length, 0);
  const done = Object.values(week.checked || {}).filter(Boolean).length;
  const rate = total ? Math.round(done / total * 100) : 0;
  const wc = document.getElementById('weekContent');
  wc.innerHTML =
    '<div class="week-header"><span class="week-title">' + esc(week.label) + '</span><span class="week-badge">진행중</span></div>' +
    '<div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar" style="width:' + rate + '%"></div></div>' +
    '<div class="progress-label"><span>' + done + ' / ' + total + ' 완료</span>' +
    '<span class="save-status"><div class="save-dot saved" id="saveDot"></div><span id="saveText">저장됨 ✓</span></span></div></div>' +
    '<div class="filter-row" id="filterRow"></div>' +
    '<div id="catContainer"></div>' +
    (editMode && activeFilter === 'all' ? '<div id="addCatWrap"></div>' : '');

  // 필터
  const filterRow = document.getElementById('filterRow');
  const mkFilter = (id, label, color) => {
    const btn = document.createElement('button');
    const active = activeFilter === id;
    btn.className = 'filter-btn' + (active ? ' active' : '');
    if (active && color) { btn.style.background = color; btn.style.borderColor = color; btn.style.color = '#fff'; }
    btn.textContent = label;
    btn.onclick = () => { activeFilter = id; render(); };
    filterRow.appendChild(btn);
  };
  mkFilter('all', '전체', null);
  week.categories.forEach(c => mkFilter(c.id, c.label, c.color));

  // 카테고리
  const catContainer = document.getElementById('catContainer');
  week.categories.forEach((cat, ci) => {
    if (activeFilter !== 'all' && activeFilter !== cat.id) return;
    const block = document.createElement('div');
    block.className = 'category-block';

    // 카테고리 드래그 (편집 + 전체 필터일 때만)
    if (editMode && activeFilter === 'all') {
      block.draggable = true;
      block.addEventListener('dragstart', e => {
        e.dataTransfer.setData('dragType', 'cat');
        e.dataTransfer.setData('fromCi', ci);
        setTimeout(() => block.classList.add('dragging'), 0);
      });
      block.addEventListener('dragend', () => block.classList.remove('dragging'));
      block.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); block.classList.add('drag-over'); });
      block.addEventListener('dragleave', e => { if (!block.contains(e.relatedTarget)) block.classList.remove('drag-over'); });
      block.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        block.classList.remove('drag-over');
        if (e.dataTransfer.getData('dragType') !== 'cat') return;
        const from = parseInt(e.dataTransfer.getData('fromCi'));
        if (from === ci) return;
        saveSnapshot();
        const moved = week.categories.splice(from, 1)[0];
        week.categories.splice(ci, 0, moved);
        scheduleSave(); render();
      });
    }

    // 헤더
    const header = document.createElement('div');
    header.className = 'category-header';
    const titleDiv = document.createElement('div');
    titleDiv.className = 'category-title';
    if (editMode && activeFilter === 'all') {
      const handle = document.createElement('span');
      handle.className = 'drag-handle';
      handle.textContent = '⠿';
      handle.title = '드래그로 카테고리 순서 변경';
      handle.addEventListener('mousedown', e => e.stopPropagation());
      titleDiv.appendChild(handle);
    }
    const dot = document.createElement('div');
    dot.className = 'cat-dot';
    dot.style.background = cat.color;
    const labelSpan = document.createElement('span');
    labelSpan.textContent = cat.label;
    const doneCount = cat.tasks.filter(t => (week.checked || {})[t.id]).length;
    const countSpan = document.createElement('span');
    countSpan.className = 'cat-count';
    countSpan.textContent = doneCount + '/' + cat.tasks.length;
    titleDiv.appendChild(dot);
    titleDiv.appendChild(labelSpan);
    titleDiv.appendChild(countSpan);
    const isOpen = !collapsed[week.id + cat.id];
    const chevron = document.createElement('span');
    chevron.className = 'chevron' + (isOpen ? ' open' : '');
    chevron.innerHTML = '&#9658;';
    header.appendChild(titleDiv);
    header.appendChild(chevron);
    header.onclick = e => {
      if (e.target.classList.contains('drag-handle')) return;
      collapsed[week.id + cat.id] = !collapsed[week.id + cat.id]; render();
    };
    block.appendChild(header);

    // 카테고리 편집 바
    if (editMode && isOpen) {
      const editBar = document.createElement('div');
      editBar.className = 'cat-edit-bar';
      editBar.onclick = e => e.stopPropagation();
      const nameInp = document.createElement('input');
      nameInp.type = 'text'; nameInp.value = cat.label; nameInp.placeholder = '카테고리명';
      nameInp.oninput = () => { cat.label = nameInp.value; renderTabs(); };
      const colorInp = document.createElement('input');
      colorInp.type = 'color'; colorInp.value = cat.color;
      colorInp.oninput = () => { saveSnapshot(); cat.color = colorInp.value; render(); };
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del-cat'; delBtn.textContent = '삭제';
      delBtn.onclick = () => deleteCat(ci);
      editBar.appendChild(nameInp); editBar.appendChild(colorInp); editBar.appendChild(delBtn);
      block.appendChild(editBar);
    }

    // 태스크 리스트
    const list = document.createElement('div');
    list.className = 'task-list';
    if (!isOpen) { list.style.display = 'none'; block.appendChild(list); catContainer.appendChild(block); return; }

    cat.tasks.forEach((t, ti) => {
      if (editMode) {
        // 편집 모드
        const row = document.createElement('div');
        row.className = 'task-edit-row';
        row.draggable = true;
        row.addEventListener('dragstart', e => {
          e.stopPropagation();
          e.dataTransfer.setData('dragType', 'task');
          e.dataTransfer.setData('fromCi', ci);
          e.dataTransfer.setData('fromTi', ti);
          setTimeout(() => row.classList.add('dragging'), 0);
        });
        row.addEventListener('dragend', () => row.classList.remove('dragging'));
        row.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); row.classList.add('drag-over'); });
        row.addEventListener('dragleave', e => { if (!row.contains(e.relatedTarget)) row.classList.remove('drag-over'); });
        row.addEventListener('drop', e => {
          e.preventDefault(); e.stopPropagation();
          row.classList.remove('drag-over');
          if (e.dataTransfer.getData('dragType') !== 'task') return;
          const fromCi = parseInt(e.dataTransfer.getData('fromCi'));
          const fromTi = parseInt(e.dataTransfer.getData('fromTi'));
          if (fromCi === ci && fromTi === ti) return;
          saveSnapshot();
          const moved = week.categories[fromCi].tasks.splice(fromTi, 1)[0];
          week.categories[ci].tasks.splice(ti, 0, moved);
          scheduleSave(); render();
        });

        // 상단 행: 핸들 + input
        const topRow = document.createElement('div');
        topRow.className = 'edit-top-row';
        const handle = document.createElement('span');
        handle.className = 'drag-handle'; handle.textContent = '⠿'; handle.title = '드래그로 항목 순서 변경';
        const inp = document.createElement('input');
        inp.type = 'text'; inp.value = t.text; inp.placeholder = '항목 내용';
        inp.addEventListener('mousedown', e => { row.draggable = false; });
        inp.addEventListener('blur', () => { row.draggable = true; });
        inp.oninput = () => { t.text = inp.value; };
        inp.onchange = () => scheduleSave();
        applyBold(inp, v => { t.text = v; });
        topRow.appendChild(handle);
        topRow.appendChild(inp);

        // 편집 탭 (디테일 / 피드백)
        const editTabKey = week.id + '_edit_' + t.id;
        if (!noteTabState[editTabKey]) noteTabState[editTabKey] = 'detail';
        const editTabsDiv = document.createElement('div');
        editTabsDiv.className = 'edit-notes-tabs';
        ['detail','feedback'].forEach(tabName => {
          const et = document.createElement('span');
          et.className = 'edit-notes-tab' + (noteTabState[editTabKey]===tabName?' active':'');
          et.textContent = tabName==='detail' ? '📋 디테일' : '💬 피드백';
          et.onclick = e => { e.stopPropagation(); noteTabState[editTabKey] = tabName; render(); };
          editTabsDiv.appendChild(et);
        });

        // textarea (디테일 or 피드백)
        const ta = document.createElement('textarea');
        const isDetailTab = noteTabState[editTabKey] === 'detail';
        ta.placeholder = isDetailTab ? '디테일 내용 (선택)' : '피드백 내용 (선택)';
        ta.value = isDetailTab ? (t.notes || '') : (t.feedback || '');
        ta.addEventListener('mousedown', e => { row.draggable = false; });
        ta.addEventListener('blur', () => { row.draggable = true; scheduleSave(); });
        ta.oninput = () => { if (noteTabState[editTabKey]==='detail') t.notes = ta.value; else t.feedback = ta.value; };
        applyBold(ta, v => { if (noteTabState[editTabKey]==='detail') t.notes = v; else t.feedback = v; });

        // 삭제 버튼
        const btnWrap = document.createElement('div');
        btnWrap.className = 'edit-row-btns';
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-del'; delBtn.textContent = '삭제';
        delBtn.onclick = () => deleteTask(ci, ti);
        btnWrap.appendChild(delBtn);
        row.appendChild(topRow); row.appendChild(editTabsDiv); row.appendChild(ta); row.appendChild(btnWrap);
        list.appendChild(row);
      } else {
        // 보기 모드
        const item = document.createElement('div');
        const isDone = (week.checked || {})[t.id];
        item.className = 'task-item' + (isDone ? ' done' : '');
        const hasNotes = t.notes && t.notes.trim();
        const hasFeedback = t.feedback && t.feedback.trim();
        const showTabs = hasNotes || hasFeedback;
        // 탭 상태 키
        const tabKey = week.id + '_' + t.id;
        if (!noteTabState[tabKey]) noteTabState[tabKey] = 'detail';
        const activeTab = noteTabState[tabKey];

        item.innerHTML =
          '<div class="checkbox"><span class="checkmark">&#10003;</span></div>' +
          '<div style="flex:1"><div class="task-text">' + formatText(t.text) + '</div>' +
          (showTabs ?
            '<div class="notes-tabs">' +
            '<span class="notes-tab' + (activeTab==='detail'?' active':'') + '" data-tab="detail" data-key="' + tabKey + '">📋 디테일</span>' +
            '<span class="notes-tab' + (activeTab==='feedback'?' active':'') + '" data-tab="feedback" data-key="' + tabKey + '">💬 피드백</span>' +
            '</div>' +
            '<div class="notes-content' + (activeTab==='feedback'?' feedback':'') + (activeTab==='detail'&&!hasNotes?' empty':'') + (activeTab==='feedback'&&!hasFeedback?' empty':'') + '">' +
            (activeTab==='detail' ? (hasNotes ? formatNotes(t.notes) : '디테일 내용 없음') : (hasFeedback ? formatNotes(t.feedback) : '피드백 없음')) +
            '</div>'
          : '') +
          '</div>';

        // 탭 클릭 이벤트
        item.querySelectorAll('.notes-tab').forEach(tab => {
          tab.onclick = e => {
            e.stopPropagation();
            noteTabState[tab.dataset.key] = tab.dataset.tab;
            render();
          };
        });
        const toggle = () => {
          if (!week.checked) week.checked = {};
          week.checked[t.id] = !week.checked[t.id];
          scheduleSave(); render();
        };
        item.querySelector('.checkbox').onclick = e => { e.stopPropagation(); toggle(); };
        item.onclick = e => { if (e.target.classList.contains('notes-tab')) return; toggle(); };
        list.appendChild(item);
      }
    });

    // 항목 추가 버튼
    if (editMode) {
      const addBtn = document.createElement('button');
      addBtn.className = 'add-task-btn'; addBtn.textContent = '＋ 항목 추가';
      addBtn.onclick = () => addTask(ci);
      list.appendChild(addBtn);
    }
    block.appendChild(list);
    catContainer.appendChild(block);
  });

  // 카테고리 추가 버튼
  const addCatWrap = document.getElementById('addCatWrap');
  if (addCatWrap) {
    const btn = document.createElement('button');
    btn.className = 'add-cat-btn'; btn.textContent = '＋ 카테고리 추가';
    btn.onclick = showAddCatModal;
    addCatWrap.appendChild(btn);
  }
}

// ===== 편집 함수 =====
function toggleEditMode() {
  editMode = !editMode;
  updateEditBtn();
  if (!editMode) scheduleSave();
  render();
}
function updateCatLabel(ci, val) { getActiveWeek().categories[ci].label = val; renderTabs(); }
function deleteCat(ci) {
  if (!confirm('"' + getActiveWeek().categories[ci].label + '" 카테고리를 삭제할까요?')) return;
  saveSnapshot();
  getActiveWeek().categories.splice(ci, 1);
  activeFilter = 'all'; scheduleSave(); render();
}
function updateTaskText(ci, ti, val) { getActiveWeek().categories[ci].tasks[ti].text = val; }
function updateTaskNotes(ci, ti, val) { getActiveWeek().categories[ci].tasks[ti].notes = val; }
function deleteTask(ci, ti) {
  saveSnapshot();
  getActiveWeek().categories[ci].tasks.splice(ti, 1);
  scheduleSave(); render();
}
function addTask(ci) {
  saveSnapshot();
  getActiveWeek().categories[ci].tasks.push({ id: nextId++, text: '', notes: '' });
  scheduleSave(); render();
}
function deleteWeek(wid) {
  const w = weeks.find(x => x.id === wid);
  if (!confirm('"' + w.label + '" 주차를 삭제할까요?')) return;
  saveSnapshot();
  weeks = weeks.filter(x => x.id !== wid);
  activeWeekId = weeks[weeks.length - 1].id;
  scheduleSave(); render();
}

// ===== 새 주차 =====
function showNewWeekModal() {
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="closeModal()">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
    '<h3>📅 새 주차 추가</h3><label>주차 이름 (예: 7/7-11)</label>' +
    '<input type="text" id="newWeekLabel" placeholder="7/7-11" autofocus>' +
    '<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">취소</button>' +
    '<button class="btn-confirm" onclick="confirmNewWeek()">추가</button></div></div></div>';
}
function confirmNewWeek() {
  const label = document.getElementById('newWeekLabel').value.trim();
  if (!label) { alert('주차 이름을 입력해주세요.'); return; }
  weeks.push({ id: 'week_' + Date.now(), label, createdAt: new Date().toISOString().slice(0,10), categories: [], checked: {} });
  activeWeekId = weeks[weeks.length - 1].id;
  activeFilter = 'all'; editMode = true;
  closeModal(); scheduleSave(); render();
}
function showAddCatModal() {
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="closeModal()">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
    '<h3>새 카테고리 추가</h3><label>카테고리 이름</label>' +
    '<input type="text" id="newCatName" placeholder="예: 마케팅" autofocus>' +
    '<label>색상</label><input type="color" id="newCatColor" value="#a29bfe" style="width:48px;height:34px;padding:2px;border-radius:8px;border:1.5px solid #dfe6e9;cursor:pointer;">' +
    '<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">취소</button>' +
    '<button class="btn-confirm" onclick="confirmAddCat()">추가</button></div></div></div>';
}
function confirmAddCat() {
  const name = document.getElementById('newCatName').value.trim();
  const color = document.getElementById('newCatColor').value;
  if (!name) { alert('카테고리 이름을 입력해주세요.'); return; }
  saveSnapshot();
  getActiveWeek().categories.push({ id: 'cat_' + Date.now(), label: name, color, tasks: [] });
  closeModal(); scheduleSave(); render();
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ===== Ctrl+Z (input/textarea 밖에서) =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    const el = document.activeElement;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    undo();
  }
});

loadFromDB();
